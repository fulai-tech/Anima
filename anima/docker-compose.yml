services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  core:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills
    environment:
      - ANIMA_LLM_API_KEY=${LLM_API_KEY}
      - ANIMA_LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - ANIMA_LLM_BASE_URL=${LLM_BASE_URL:-}
      - ANIMA_MQTT_HOST=mqtt
      - ANIMA_MQTT_PORT=1883
    depends_on:
      - mqtt
    network_mode: host  # needed for mDNS device discovery on local network
    restart: unless-stopped
